<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi Ki Doğdun Sevgilim ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* İstediğin gibi tamamen siyah arka plan */
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Arka Plandaki Sabit Parıltı Yıldız Efektleri (Siyah arka planda çok daha şık duracak) */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(rgba(255, 255, 255, 0.3), rgba(255,255,255,0) 2px, transparent 40px),
                radial-gradient(rgba(255, 255, 255, 0.2), rgba(255,255,255,0) 1px, transparent 30px);
            background-size: 400px 400px, 250px 250px;
            background-position: 0 0, 40px 60px;
            opacity: 0.6;
            z-index: 0;
        }

        /* Sabit Kalp Alanları (Sağ ve Sol Boşluklar) */
        .heart-area {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 15vw;
            overflow: hidden;
            pointer-events: none;
            z-index: 1;
        }
        .left-area { left: 0; }
        .right-area { right: 0; }

        .heart {
            position: absolute;
            bottom: -20px;
            color: rgba(255, 192, 203, 0.75); /* Parlayan soft pembe kalpler */
            font-size: 20px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-105vh) translateX(var(--randomX)) rotate(360deg);
                opacity: 0;
            }
        }

        /* Ana Konteyner - Tamamen Siyah Üzerinde Parlayan Cam (Glassmorphism) Efekti */
        .container {
            width: 90%;
            max-width: 650px;
            background: rgba(255, 255, 255, 0.04); /* Ultra saydam cam tabanı */
            backdrop-filter: blur(25px); /* Güçlü buzlu cam efekti */
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.18); /* Net cam çerçeve çizgisi */
            padding: 45px 40px;
            border-radius: 30px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), inset 0 0 30px rgba(255, 255, 255, 0.02);
            text-align: center;
            z-index: 10;
            position: relative;
        }

        /* Üstteki Dekoratif Parlayan Kalp */
        .top-glow-heart {
            font-size: 2rem;
            margin-bottom: 15px;
            display: inline-block;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.8));
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Sayfa Yönetimi */
        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* Tipografi & İçerik */
        h1 {
            font-size: 2.6rem;
            margin-bottom: 25px;
            background: linear-gradient(to right, #ffb6c1, #ffe4e1, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Yavaş Yavaş Yazılan Metin Alanı */
        .typewriter-text {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #f0f4f8;
            margin-bottom: 35px;
            min-height: 120px; 
            white-space: pre-line;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        /* Premium Pembe Buton */
        .btn {
            background: linear-gradient(45deg, #ff5376, #ff758c);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px 40px;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 83, 118, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
            opacity: 0; 
            transform: translateY(10px);
            pointer-events: none;
        }

        .btn.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .btn:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 15px 30px rgba(255, 83, 118, 0.5);
            background: linear-gradient(45deg, #ff758c, #ff5376);
        }

        .btn:active {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <audio id="bgMusic" src="sarki.mp3" loop></audio>

    <div class="heart-area left-area" id="leftHearts"></div>
    <div class="heart-area right-area" id="rightHearts"></div>

    <div class="container">
        <div class="top-glow-heart">🤍</div>
        
        <div class="page active" id="page1" data-text="Hayatımın en güzel detayına, dünyamı güzelleştiren kadına minik bir yolculuk. Hazırsan aşağıdaki butona basıp arkana yaslan sevgilim.">
            <h1>Senin İçin Küçük Bir Sürpriz... ✨</h1>
            <p class="typewriter-text"></p>
            <button class="btn" onclick="startJourney()">Yolculuğa Başla ❤️</button>
        </div>

        <div class="page" id="page2" data-text="Bugün sıradan bir gün değil; seninle birlikte dünyaya neşenin, zarafetin ve sevginin adım attığı gün. 

        Hayatıma girdiğin andan beri her günümü güzelleştirdiğin, bana sevmeyi ve sevilmeyi en saf haliyle hissettirdiğin için teşekkür ederim. İyi ki doğdun, iyi ki benim oldun.">
            <h1>İyi Ki Doğdun Dünyam 🎂</h1>
            <p class="typewriter-text"></p>
            <button class="btn" onclick="nextPage(3)">Devam Et ✨</button>
        </div>

        <div class="page" id="page3" data-text="Gözlerine her baktığımda, seninle geçirdiğim her saniyede ne kadar şanslı olduğumu bir kez daha anlıyorum. 

        Gülüşün kalbimin en huzurlu köşesi. Seninle kurduğumuz hayaller, paylaştığımız her sessizlik bile benim için paha biçilemez. Hayatımın geri kalanında da her doğum gününde elini tutan adam olmak istiyorum.">
            <h1>Seninle Her Anım Çok Özel... 💫</h1>
            <p class="typewriter-text"></p>
            <button class="btn" onclick="nextPage(4)">Sonsuza Dek 🌹</button>
        </div>

        <div class="page" id="page4" data-text="Yeni yaşında kalbinden geçen tüm güzellikler seni bulsun sevgilim. Umutların, neşen ve o güzel yüzündeki gülümseme hiç eksilmesin. 

        Ben her anında, her adımında, her yeni yaşında senin tam yanında olacağım. Doğum günün kutlu olsun her şeyim, iyi ki varsın!">
            <h1>Seni Çok Seviyorum ❤️</h1>
            <p class="typewriter-text"></p>
            <button class="btn" onclick="restartJourney()">Başa Dön 🔄</button>
        </div>
    </div>

    <script>
        let musicStarted = false;
        let heartInterval;
        let typingTimeout;

        window.onload = function() {
            typeWriterEffect(1);
        };

        function startJourney() {
            if (!musicStarted) {
                const music = document.getElementById('bgMusic');
                music.play().catch(error => console.log("Müzik izni bekleniyor:", error));
                musicStarted = true;
            }
            
            if(!heartInterval) {
                heartInterval = setInterval(createHeart, 250); 
            }

            nextPage(2);
        }

        function nextPage(pageNumber) {
            clearTimeout(typingTimeout); 

            const activePage = document.querySelector('.page.active');
            if (activePage) {
                activePage.classList.remove('active');
            }

            setTimeout(() => {
                const targetPage = document.getElementById('page' + pageNumber);
                if (targetPage) {
                    targetPage.classList.add('active');
                    typeWriterEffect(pageNumber);
                }
            }, 50);
        }

        function typeWriterEffect(pageNumber) {
            const page = document.getElementById('page' + pageNumber);
            const textContainer = page.querySelector('.typewriter-text');
            const btn = page.querySelector('.btn');
            const fullText = page.getAttribute('data-text');
            
            textContainer.textContent = "";
            btn.classList.remove('show'); 

            let index = 0;
            const speed = 25; 

            function type() {
                if (index < fullText.length) {
                    textContainer.textContent += fullText.charAt(index);
                    index++;
                    typingTimeout = setTimeout(type, speed);
                } else {
                    btn.classList.add('show');
                }
            }
            type();
        }

        function createHeart() {
            const leftArea = document.getElementById('leftHearts');
            const rightArea = document.getElementById('rightHearts');
            const targetArea = Math.random() > 0.5 ? leftArea : rightArea;
            
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '🤍'; 
            
            const size = Math.random() * 14 + 10; 
            const duration = Math.random() * 3 + 4; 
            const randomX = (Math.random() * 70 - 35) + 'px'; 
            const startLeft = Math.random() * 85 + '%'; 

            heart.style.fontSize = size + 'px';
            heart.style.animationDuration = duration + 's';
            heart.style.left = startLeft;
            heart.style.setProperty('--randomX', randomX);
            
            targetArea.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        function restartJourney() {
            nextPage(1);
        }
    </script>
</body>
</html>
