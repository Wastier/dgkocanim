<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi Ki Doğdun Sevgilim</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Siyah-Beyaz / Antrasit lüks degrade arka plan */
            background: linear-gradient(135deg, #050505, #121212, #1a1a1a, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Gümüş Yıldız Tozu Efekti */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(rgba(255, 255, 255, 0.25), rgba(255,255,255,0) 2px, transparent 40px),
                radial-gradient(rgba(255, 255, 255, 0.15), rgba(255,255,255,0) 1px, transparent 30px);
            background-size: 400px 400px, 250px 250px;
            background-position: 0 0, 40px 60px;
            opacity: 0.7;
            z-index: 0;
        }

        /* Sabit Kalp Alanları (Sağ ve Sol Boşluklar) */
        .heart-area {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 15vw;
            overflow: hidden;
            pointer-events: none;
            z-index: 1;
        }
        .left-area { left: 0; }
        .right-area { right: 0; }

        .heart {
            position: absolute;
            bottom: -20px;
            color: rgba(240, 240, 240, 0.5); /* Siyah-beyaz temaya uygun kristal beyaz kalpler */
            font-size: 20px;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-105vh) translateX(var(--randomX)) rotate(360deg);
                opacity: 0;
            }
        }

        /* Ana Konteyner - Gümüş Çerçeveli Lüks Cam Efekti */
        .container {
            width: 90%;
            max-width: 650px;
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15); /* İnce gümüş kontür çizgisi */
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.9), inset 0 0 30px rgba(255, 255, 255, 0.01);
            text-align: center;
            z-index: 10;
            position: relative;
        }

        /* Sayfa Yönetimi */
        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* Tipografi & İçerik - Saf Beyaz ve Gümüş Geçişleri */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 25px;
            background: linear-gradient(to right, #ffffff, #cccccc, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Yavaş Yavaş Yazılan Metin Alanı */
        .typewriter-text {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #e0e0e0;
            margin-bottom: 35px;
            min-height: 120px; 
            white-space: pre-line;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Premium Gümüş/Beyaz Buton */
        .btn {
            background: linear-gradient(45deg, #ededed, #ffffff);
            color: #0a0a0a; /* Siyah yazı kontrastı */
            border: 1px solid rgba(255,255,255,0.8);
            padding: 15px 42px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
            opacity: 0; 
            transform: translateY(10px);
            pointer-events: none;
            letter-spacing: 0.5px;
        }

        .btn.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.25);
            background: linear-gradient(45deg, #ffffff, #ededed);
        }

        .btn:active {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <audio id="bgMusic" src="sarki.mp3" loop></audio>

    <div class="heart-area left-area" id="leftHearts"></div>
    <div class="heart-area right-area" id="rightHearts"></div>

    <div class="container">
        
        <div class="page active" id="page1" data-text="Hayatımın en güzel detayına, dünyamı güzelleştiren kadına minik bir yolculuk. Hazırsan aşağıdaki butona basıp arkana yaslan sevgilim.">
            <h1>Senin İçin Küçük Bir Sürpriz...</h1>
            <p class="typewriter-text"></p>
            <button class="btn" onclick="startJourney()">Yolculuğa Başla</button>
        </div>

        <div class="page" id="page2" data-text="Bugün sıradan bir gün değil; seninle birlikte dünyaya neşenin, zarafetin ve sevginin adım attığı gün. 

        Hayatıma girdiğin andan beri her günümü güzelleştirdiğin, bana sevmeyi ve sevilmeyi en saf haliyle hissettirdiğin için teşekkür ederim. İyi ki doğdun, iyi ki benim oldun.">
            <h1>İyi Ki Doğdun Dünyam</h1>
            <p class="typewriter-text"></p>
            <button class="btn" onclick="nextPage(3)">Devam Et</button>
        </div>

        <div class="page" id="page3" data-text="Gözlerine her baktığımda, seninle geçirdiğim her saniyede ne kadar şanslı olduğumu bir kez daha anlıyorum. 

        Gülüşün kalbimin en huzurlu köşesi. Seninle kurduğumuz hayaller, paylaştığımız her sessizlik bile benim için paha biçilemez. Hayatımın geri kalanında da her doğum gününde elini tutan adam olmak istiyorum.">
            <h1>Seninle Her Anım Çok Özel...</h1>
            <p class="typewriter-text"></p>
            <button class="btn" onclick="nextPage(4)">Sonsuza Dek</button>
        </div>

        <div class="page" id="page4" data-text="Yeni yaşında kalbinden geçen tüm güzellikler seni bulsun sevgilim. Umutların, neşen ve o güzel yüzündeki gülümseme hiç eksilmesin. 

        Ben her anında, her adımında, her yeni yaşında senin tam yanında olacağım. Doğum günün kutlu olsun her şeyim, iyi ki varsın!">
            <h1>Seni Çok Seviyorum</h1>
            <p class="typewriter-text"></p>
            <button class="btn" onclick="restartJourney()">Başa Dön</button>
        </div>
    </div>

    <script>
        let musicStarted = false;
        let heartInterval;
        let typingTimeout;

        window.onload = function() {
            typeWriterEffect(1);
        };

        function startJourney() {
            if (!musicStarted) {
                const music = document.getElementById('bgMusic');
                music.play().catch(error => console.log("Müzik izni bekleniyor:", error));
                musicStarted = true;
            }
            
            // Kalp uçma mekanizmasını buton tıklandığı an aktif ediyoruz
            if(!heartInterval) {
                heartInterval = setInterval(createHeart, 200); // 200ms ile akıcı kalp yoğunluğu
            }

            nextPage(2);
        }

        function nextPage(pageNumber) {
            clearTimeout(typingTimeout); 

            const activePage = document.querySelector('.page.active');
            if (activePage) {
                activePage.classList.remove('active');
            }

            setTimeout(() => {
                const targetPage = document.getElementById('page' + pageNumber);
                if (targetPage) {
                    targetPage.classList.add('active');
                    typeWriterEffect(pageNumber);
                }
            }, 50);
        }

        function typeWriterEffect(pageNumber) {
            const page = document.getElementById('page' + pageNumber);
            const textContainer = page.querySelector('.typewriter-text');
            const btn = page.querySelector('.btn');
            const fullText = page.getAttribute('data-text');
            
            textContainer.textContent = "";
            btn.classList.remove('show'); 

            let index = 0;
            const speed = 25; 

            function type() {
                if (index < fullText.length) {
                    textContainer.textContent += fullText.charAt(index);
                    index++;
                    typingTimeout = setTimeout(type, speed);
                } else {
                    btn.classList.add('show');
                }
            }
            type();
        }

        // Sağ ve soldan uçan kalpler fonksiyonu
        function createHeart() {
            const leftArea = document.getElementById('leftHearts');
            const rightArea = document.getElementById('rightHearts');
            const targetArea = Math.random() > 0.5 ? leftArea : rightArea;
            
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '🤍'; // Siyah-beyaz konsepte tam oturan şık beyaz kalp
            
            const size = Math.random() * 14 + 10; 
            const duration = Math.random() * 3 + 4; 
            const randomX = (Math.random() * 70 - 35) + 'px'; 
            const startLeft = Math.random() * 85 + '%'; 

            heart.style.fontSize = size + 'px';
            heart.style.animationDuration = duration + 's';
            heart.style.left = startLeft;
            heart.style.setProperty('--randomX', randomX);
            
            targetArea.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        function restartJourney() {
            nextPage(1);
        }
    </script>
</body>
</html>
